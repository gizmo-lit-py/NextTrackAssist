{% extends "base.html" %}

{% block content %}

<h1>Login</h1>

<form method="POST">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

<p>
Email
<br>
<input name="email" type="email" required>
</p>

<p>
Password
<br>
<input type="password" name="password" required>
</p>

<button type="submit">
Login
</button>

</form>

<p>
<a href="/register">Register</a>
</p>

{% endblock %}
