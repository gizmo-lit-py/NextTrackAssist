{% extends "base.html" %}

{% block content %}

<h1>Register</h1>

<form method="POST">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

<p>
Email
<br>
<input name="email" type="email" required>
</p>

<p>
Password
<br>
<input type="password" name="password" minlength="8" required>
</p>

<p>
8文字以上のパスワードを設定してください。
</p>

<button type="submit">
Register
</button>

</form>

<p>
<a href="/login">Login</a>
</p>

{% endblock %}
