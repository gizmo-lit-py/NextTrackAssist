{% extends "base.html" %}

{% block content %}

<div class="max-w-md mx-auto">

<h1 class="text-2xl font-bold mb-6">Register</h1>

<form method="POST" class="bg-white rounded-lg border border-gray-200 p-6 space-y-4">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

<div>
<label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
<input name="email" type="email" required
  class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
</div>

<div>
<label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
<input type="password" name="password" minlength="8" required
  class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
<p class="text-xs text-gray-400 mt-1">8文字以上のパスワードを設定してください。</p>
</div>

<button type="submit"
  class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 transition-colors font-medium">
Register
</button>

</form>

<p class="text-center text-sm text-gray-500 mt-4">
すでにアカウントをお持ちの方は <a href="/login" class="text-blue-600 hover:underline">Login</a>
</p>

</div>

{% endblock %}
