{% extends "base.html" %}

{% block content %}

<h1>{{track.title}}</h1>

<p>
Artist : {{track.artist}}
</p>

<p>
BPM : {{track.bpm}}
</p>

<p>
Key : {{track.key}}
</p>

<p>
Energy : {{track.energy}}
</p>

<a href="/tracks/{{track.id}}/edit">
Edit
</a>

<form method="POST" action="/tracks/{{track.id}}/delete">

<button type="submit">
Delete
</button>

</form>

{% endblock %}
