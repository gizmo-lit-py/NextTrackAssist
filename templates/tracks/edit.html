{% extends "base.html" %}

{% block content %}

<h1>Edit Track</h1>

<form method="POST" action="/tracks/{{track.id}}/update">

<p>
Title
<br>
<input name="title" value="{{track.title}}">
</p>

<p>
Artist
<br>
<input name="artist" value="{{track.artist}}">
</p>

<p>
BPM
<br>
<input name="bpm" value="{{track.bpm}}">
</p>

<p>
Key
<br>
<input name="key" value="{{track.key}}">
</p>

<p>
Energy
<br>
<input name="energy" value="{{track.energy}}">
</p>

<button type="submit">
Update
</button>

</form>

{% endblock %}
