<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<title>NextTrackAssist</title>

<style>

body{
font-family: Arial;
margin:40px;
line-height:1.5;
}

header{
margin-bottom:30px;
}

nav a{
margin-right:20px;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
text-decoration:underline;
}

.container{
max-width:900px;
}

.track{
margin-bottom:10px;
}

.flash{
padding:10px 12px;
border-radius:8px;
margin:10px 0;
}

.flash.error{
background:#fff3f3;
border:1px solid #e6b8b8;
}

.flash.success{
background:#f2fbf2;
border:1px solid #b6dfb6;
}

</style>

</head>

<body>

<header>

<h2>NextTrackAssist</h2>

<nav>
{% if session.get("user_id") %}
<a href="/">Tracks</a>
<a href="/tracks/new">Add Track</a>
<a href="/tracks/generate-set">Generate Set</a>
<form action="/logout" method="POST" style="display:inline">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
<button type="submit" style="background:none;border:none;color:inherit;font-weight:bold;cursor:pointer;font-size:inherit;padding:0;margin-right:20px;">Logout</button>
</form>
{% else %}
<a href="/login">Login</a>
<a href="/register">Register</a>
{% endif %}

</nav>

</header>

<hr>

<div class="container">

{% with messages = get_flashed_messages(with_categories=true) %}
{% for category, message in messages %}
<div class="flash {{category}}">
{{message}}
</div>
{% endfor %}
{% endwith %}

{% block content %}
{% endblock %}

</div>

</body>
</html>
