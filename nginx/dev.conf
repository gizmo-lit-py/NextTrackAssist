# ==========================================
# Nginx Configuration (development / local)
# ==========================================
# 目的: docker-compose up でそのまま http://localhost にアクセスできる構成。
#  - HTTPS / Let's Encrypt 等は使わない（証明書の用意・ドメイン設定が要らない）
#  - 本番用は nginx/prod.conf を別に用意している
# ==========================================

server {
    listen 80;
    server_name localhost;

    # アップロード CSV のサイズ上限（rekordbox エクスポート想定で 5MB）
    client_max_body_size 5M;

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
